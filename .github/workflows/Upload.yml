name: Upload

on:
  schedule:
    - cron: "30 21 * * *"  # Runs every day at 21:30 UTC
  workflow_dispatch:     # Allows manual triggering

env:
  ACTIONS_ALLOW_UNSECURE_COMMANDS: true  # Required for FFmpeg installation
  API: ${{ secrets.API }}
  TOKEN: ${{ secrets.TOKEN }}
  GMAIL: ${{ secrets.GMAIL }}
  PASS: ${{ secrets.PASS }}

jobs:
  setup-ffmpeg:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2, 3, 4, 5]
    steps:
      - name: Setup FFmpeg (Attempt ${{ matrix.attempt }})
        uses: federicocarboni/setup-ffmpeg@v3.1

      - name: Verify FFmpeg
        run: ffmpeg -version

  scrape-latest:
    runs-on: ubuntu-latest
    needs: setup-ffmpeg

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.12.2'

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Test env vars for python
        run: echo "TEST_SECRET=${{ secrets.API }}"

      - name: Download
        run: python download.py

      - name: Process
        run: python shorts_main.py
